name: Build Windows Binary

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - CMakeLists.txt
      - include/**
      - src/**
      - scripts/build-windows.ps1
      - .github/workflows/build-windows-binary.yml

permissions:
  contents: write

jobs:
  build-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: '12.4.1'

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build -A x64 -DASR_ENABLE_CUDA=ON -DGGML_CUDA_FA=OFF -DCMAKE_CUDA_ARCHITECTURES="75-real;75-virtual"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel 1

      - name: Prepare Output
        shell: pwsh
        run: |
          $dest = "bin/windows-x86_64"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item "build/Release/asr.exe" "$dest/asr.exe" -Force
          Get-ChildItem "build/Release" -Filter "*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName (Join-Path $dest $_.Name) -Force
          }

      - name: Check Binary Size
        id: size_check
        shell: pwsh
        run: |
          $exe = "bin/windows-x86_64/asr.exe"
          $size = (Get-Item $exe).Length
          $sizeMB = [Math]::Round($size / 1MB, 2)
          Write-Host "Windows binary size: $sizeMB MB"
          if ($size -gt 100MB) {
            Write-Warning "Binary exceeds GitHub 100MB limit; skip committing to repo."
            "too_large=true" >> $env:GITHUB_OUTPUT
          } else {
            "too_large=false" >> $env:GITHUB_OUTPUT
          }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: asr-windows-x86_64
          path: bin/windows-x86_64
          if-no-files-found: error

      - name: Commit Updated Binary
        if: steps.size_check.outputs.too_large != 'true'
        shell: pwsh
        run: |
          $changes = git status --porcelain -- bin/windows-x86_64
          if ($changes) {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add bin/windows-x86_64
            git commit -m "chore(ci): update windows x86_64 binary [skip ci]"
            git pull --rebase origin main
            git push
          } else {
            Write-Host "No Windows binary changes"
          }
