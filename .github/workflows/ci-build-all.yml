name: CI Build (Linux/macOS/Windows)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - CMakeLists.txt
      - include/**
      - src/**
      - scripts/**
      - install.sh
      - README.md
      - docs/**
      - SKILL.md
      - .github/workflows/ci-build-all.yml
      - .github/workflows/release-from-artifacts.yml
  pull_request:
    paths:
      - CMakeLists.txt
      - include/**
      - src/**
      - scripts/**
      - install.sh
      - README.md
      - docs/**
      - SKILL.md
      - .github/workflows/ci-build-all.yml
      - .github/workflows/release-from-artifacts.yml

permissions:
  contents: read

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CUDA Toolkit (Linux)
        if: runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: '12.4.1'

      - name: Install CUDA Toolkit (Windows)
        if: runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: '12.4.1'

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DASR_ENABLE_CUDA=ON -DGGML_CUDA_FA=OFF -DCMAKE_CUDA_ARCHITECTURES='75-real;75-virtual' -DBUILD_SHARED_LIBS=ON -DGGML_BACKEND_DL=ON

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DASR_ENABLE_CUDA=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -B build -A x64 -DASR_ENABLE_CUDA=ON -DGGML_CUDA_FA=OFF -DCMAKE_CUDA_ARCHITECTURES="75-real;75-virtual" -DBUILD_SHARED_LIBS=ON -DGGML_BACKEND_DL=ON

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --parallel 4

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release --parallel 4

      - name: Prepare Output (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p out/linux-x86_64
          cp build/asr-tool out/linux-x86_64/asr-tool
          chmod +x out/linux-x86_64/asr-tool
          find build -type f \( -name 'libwhisper*.so*' -o -name 'libggml*.so*' \) -exec cp -f {} out/linux-x86_64/ \;
          (cd out/linux-x86_64 && zip -r ../asr-tool-linux-x86_64.zip .)

      - name: Prepare Output (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p out/macos-arm64
          cp build/asr-tool out/macos-arm64/asr-tool
          chmod +x out/macos-arm64/asr-tool

      - name: Prepare Output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out/windows-x86_64 | Out-Null
          Copy-Item build/Release/asr-tool.exe out/windows-x86_64/asr-tool.exe -Force
          Get-ChildItem -Path build -Recurse -File -Include whisper*.dll,ggml*.dll | ForEach-Object {
            Copy-Item $_.FullName out/windows-x86_64 -Force
          }
          Compress-Archive -Path out/windows-x86_64/* -DestinationPath out/asr-tool-windows-x86_64.zip -Force

      - name: Upload Artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: asr-tool-linux-x86_64
          path: out/asr-tool-linux-x86_64.zip
          if-no-files-found: error

      - name: Upload Artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: asr-tool-macos-arm64
          path: out/macos-arm64/asr-tool
          if-no-files-found: error

      - name: Upload Artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: asr-tool-windows-x86_64
          path: out/asr-tool-windows-x86_64.zip
          if-no-files-found: error
