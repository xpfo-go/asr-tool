name: CI Build (Linux/macOS/Windows)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - CMakeLists.txt
      - include/**
      - src/**
      - scripts/**
      - .github/workflows/ci-build-all.yml
  pull_request:
    paths:
      - CMakeLists.txt
      - include/**
      - src/**
      - scripts/**
      - .github/workflows/ci-build-all.yml

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit (Linux)
        if: runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: '12.4.1'

      - name: Install CUDA Toolkit (Windows)
        if: runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: '12.4.1'

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DASR_ENABLE_CUDA=ON -DGGML_CUDA_FA=OFF -DCMAKE_CUDA_ARCHITECTURES='75-real;75-virtual'

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DASR_ENABLE_CUDA=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -B build -A x64 -DASR_ENABLE_CUDA=ON -DGGML_CUDA_FA=OFF -DCMAKE_CUDA_ARCHITECTURES="75-real;75-virtual"

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --parallel 4

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release --parallel 4

      - name: Prepare Output (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p out/linux-x86_64
          cp build/asr out/linux-x86_64/asr
          chmod +x out/linux-x86_64/asr

      - name: Prepare Output (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p out/macos-arm64
          cp build/asr out/macos-arm64/asr
          chmod +x out/macos-arm64/asr

      - name: Prepare Output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out/windows-x86_64 | Out-Null
          Copy-Item build/Release/asr.exe out/windows-x86_64/asr.exe -Force

      - name: Upload Artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: asr-linux-x86_64
          path: out/linux-x86_64/asr
          if-no-files-found: error

      - name: Upload Artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: asr-macos-arm64
          path: out/macos-arm64/asr
          if-no-files-found: error

      - name: Upload Artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: asr-windows-x86_64
          path: out/windows-x86_64/asr.exe
          if-no-files-found: error

  commit-binaries:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    name: Commit Binaries
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: asr-linux-x86_64
          path: bin/linux-x86_64

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: asr-macos-arm64
          path: bin/macos-arm64

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: asr-windows-x86_64
          path: bin/windows-x86_64

      - name: Normalize Permissions
        run: |
          chmod +x bin/linux-x86_64/asr || true
          chmod +x bin/macos-arm64/asr || true

      - name: Commit Updated Binaries
        run: |
          if [[ -n "$(git status --porcelain -- bin)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add bin
            git commit -m "chore(ci): update binaries [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No binary changes"
          fi
