name: Build macOS Binary

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - CMakeLists.txt
      - include/**
      - src/**
      - scripts/build-macos.sh
      - .github/workflows/build-macos-binary.yml

permissions:
  contents: write

jobs:
  build-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DASR_ENABLE_CUDA=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Prepare Output
        run: |
          mkdir -p bin/macos-arm64
          cp build/asr bin/macos-arm64/asr
          chmod +x bin/macos-arm64/asr

      - name: Commit Updated Binary
        run: |
          if [[ -n "$(git status --porcelain -- bin/macos-arm64/asr)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add bin/macos-arm64/asr
            git commit -m "chore(ci): update macOS arm64 binary [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No macOS binary changes"
          fi
